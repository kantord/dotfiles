config:
  width: 250
  outer_gap: 8

layout:
  type: container
  tw: "flex flex-col h-full w-full px-4 py-4"
  style:
    backgroundImage: "url(root-bg)"
    backgroundSize: "100% 100%"
  children:
    - type: container
      tw: "flex-1 flex flex-col w-full"
      children:
        - bin@: /home/kantord/.cargo/bin/costae-i3
    - type: container
      tw: "flex flex-col gap-[10px] w-full"
      children:
        - type: container
          tw: "flex flex-col gap-1 rounded-lg border border-[rgba(255,255,255,0.2)] bg-[rgba(255,255,255,0.08)] backdrop-blur-md px-3 py-[10px]"
          children:
            - type: text
              tw: "text-[10px] text-[rgba(255,255,255,0.9)]"
              text: "DATE"
            - type: text
              tw: "text-[14px] text-white"
              text:
                bin@: /usr/bin/bash
                script: |
                  while true; do
                    date +"%b %-d"
                    sleep 1
                  done
        - type: container
          tw: "flex flex-col gap-1 rounded-lg border border-[rgba(255,255,255,0.2)] bg-[rgba(255,255,255,0.08)] backdrop-blur-md px-3 py-[10px]"
          children:
            - type: text
              tw: "text-[10px] text-[rgba(255,255,255,0.9)]"
              text: "TIME"
            - type: text
              tw: "text-[14px] text-white"
              text:
                bin@: /usr/bin/bash
                script: |
                  while true; do
                    date +"%H:%M"
                    sleep 1
                  done
        - type: image
          src: "/home/kantord/.config/costae/tux.png"
          tw: "w-[80px] h-[80px]"
